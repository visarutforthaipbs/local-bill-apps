const FREQ_LABEL = {monthly:'ทุกเดือน',quarterly:'ทุกไตรมาส',yearly:'ทุกปี'};
function advanceDate(iso,freq){
  const d=new Date(iso);
  if(freq==='monthly') d.setMonth(d.getMonth()+1);
  else if(freq==='quarterly') d.setMonth(d.getMonth()+3);
  else d.setFullYear(d.getFullYear()+1);
  return d.toISOString().slice(0,10);
}
function dueRecurring(){ return DB.recurring.filter(r=> r.active!==false && r.nextDate && r.nextDate<=todayISO()); }

function saveRecurring(){
  const r=editRec;
  r.items=r.items.filter(it=>(it.description||'').trim()||Number(it.price)>0);

  if(r.id){ const i=DB.recurring.findIndex(x=>x.id===r.id); DB.recurring[i]=r; }
  else{ r.id=uid(); DB.recurring.push(r); }
  persist(); closeModal(); setView('recurring'); toast(tr('บันทึกรายการประจำแล้ว'),'ok');

function generateRecurring(id){
  const r=DB.recurring.find(x=>x.id===id);
  const issue = r.nextDate<=todayISO()? r.nextDate : todayISO();
  const inv={id:uid(),type:'invoice',number:nextNumber('invoice',issue),clientId:r.clientId,parentId:null,
    issueDate:issue,dueDate:addDays(issue,30),paidDate:null,status:'draft',project:r.project,
    currency:r.currency||DB.business.currency||'THB',
    items:JSON.parse(JSON.stringify(r.items)),vatRate:r.vatRate,whtRate:r.whtRate,notes:r.notes,
    createdAt:new Date().toISOString(),recurringId:r.id};
  commitNumber('invoice',issue);
  DB.documents.push(inv);
  r.lastGenerated=issue;
  r.nextDate=advanceDate(r.nextDate,r.frequency);
  persist(); viewDoc(inv.id); toast(tr('สร้างใบแจ้งหนี้จากรายการประจำแล้ว — ครั้งถัดไป {d}').replace('{d}',fmtDate(r.nextDate)),'ok');

/* ---------- YEAR-END TAX SUMMARY ---------- */
let reportYear = new Date().getFullYear();
function docTaxDate(d){ return d.paidDate || d.issueDate || ''; }
function realizedDocs(){ return DB.documents.filter(d=> d.type==='receipt' || d.type==='tax_invoice'); }
function reportYears(){
  const ys = new Set(realizedDocs().map(d=> new Date(docTaxDate(d)).getFullYear()).filter(y=>!isNaN(y)));
  ys.add(new Date().getFullYear());
  return [...ys].sort((a,b)=>b-a);
}
function setReportYear(y){ reportYear = Number(y); render(); }
function displayYear(g){ return DB.business.yearMode==='be' ? g+543 : g; }

// รวมยอดรายรับทั้งปี — ใช้ร่วมกันระหว่างหน้าสรุปภาษี หน้ายื่นภาษี และชุดส่งออกให้บัญชี
function taxYearAgg(year){
  const docs = realizedDocs().filter(d=> new Date(docTaxDate(d)).getFullYear()===year);
  const thb = docs.filter(d=> docCurrency(d)==='THB');
  const agg = {subtotal:0,vat:0,wht:0,grand:0,net:0,count:thb.length};
  const byMonth = Array.from({length:12},()=>0);
  const byClient = {};
  thb.forEach(d=>{
    const t=compute(d);
    agg.subtotal+=t.subtotal; agg.vat+=t.vatAmount; agg.wht+=t.whtAmount; agg.grand+=t.grandTotal; agg.net+=t.netPayable;
    byMonth[new Date(docTaxDate(d)).getMonth()] += t.grandTotal;
    const cl=clientById(d.clientId); const nm=cl?cl.name:'—';
    byClient[nm]=(byClient[nm]||0)+t.netPayable;
  });
  // foreign income, per currency — converted to THB with the per-document FX rate when given
  const foreign={};
  docs.filter(d=> docCurrency(d)!=='THB').forEach(d=>{ const cur=docCurrency(d); const t=compute(d);
    const f = foreign[cur]=foreign[cur]||{grand:0,net:0,count:0,thb:0,missing:0};
    f.grand+=t.grandTotal; f.net+=t.netPayable; f.count++;
    const r=Number(d.fxRate)||0;
    if(r>0) f.thb += t.grandTotal*r; else f.missing++;
  });
  const foreignThb = Object.values(foreign).reduce((s,f)=>s+f.thb,0);
  const foreignMissing = Object.values(foreign).reduce((s,f)=>s+f.missing,0);
  return {docs, agg, byMonth, byClient, foreign, foreignThb, foreignMissing};
}

function buildReportCSV(year){
  const docs = realizedDocs().filter(d=> new Date(docTaxDate(d)).getFullYear()===year)
    .sort((a,b)=> docTaxDate(a).localeCompare(docTaxDate(b)));
  const head=['เลขที่','ประเภท','วันที่','ลูกค้า','เลขผู้เสียภาษี','สกุลเงิน','ก่อนVAT','VAT','รวม','หักณที่จ่าย','สุทธิ','อัตราแลกเปลี่ยน','เทียบเท่าบาท'].map(s=>tr(s));
  const rows=docs.map(d=>{ const t=compute(d); const cl=clientById(d.clientId);
    const rate = t.currency==='THB' ? 1 : (Number(d.fxRate)||'');
    const thbEq = rate ? (t.grandTotal*rate).toFixed(2) : '';
    return [d.number,typeName(d.type),docTaxDate(d),cl?cl.name:'',cl?cl.taxId||'':'',t.currency,
      t.subtotal.toFixed(2),t.vatAmount.toFixed(2),t.grandTotal.toFixed(2),t.whtAmount.toFixed(2),t.netPayable.toFixed(2),
      rate,thbEq].map(csvCell).join(',');
  });
  return '﻿'+[head.join(','),...rows].join('\n');
}
function exportReportCSV(){
  downloadFile(buildReportCSV(reportYear), 'tax-summary-'+displayYear(reportYear)+'.csv', 'text/csv;charset=utf-8');
}

/* ---------- ยื่นภาษี — ผู้ช่วย ภ.ง.ด. 90/94 ---------- */
// รวมรายรับตามช่วงเดือน (mFrom..mTo, 0-11) ของปีภาษี — ต่างสกุลเงินเทียบบาทด้วย fxRate รายเอกสาร
function filingIncome(year, mFrom, mTo){
  const res={grossThb:0, wht:0, foreignThb:0, foreignMissing:0, count:0};
  realizedDocs().forEach(d=>{
    const ds=docTaxDate(d); if(!ds) return;
    const dt=parseDate(ds);
    if(dt.getFullYear()!==year) return;
    const m=dt.getMonth(); if(m<mFrom||m>mTo) return;
    // เงินได้พึงประเมินไม่รวม VAT — ภาษีขายเก็บแทนสรรพากร ไม่ใช่เงินได้
    const t=compute(d); res.count++;
    if(t.currency==='THB'){ res.grossThb+=t.subtotal; res.wht+=t.whtAmount; }
    else { const r=Number(d.fxRate)||0; if(r>0) res.foreignThb+=t.subtotal*r; else res.foreignMissing++; }
  });
  return res;
}
// ภาษีเงินได้บุคคลธรรมดา — ขั้นบันไดปัจจุบัน (เงินได้สุทธิ)
const PIT_BRACKETS=[[150000,0],[300000,.05],[500000,.10],[750000,.15],[1000000,.20],[2000000,.25],[4000000,.30],[Infinity,.35]];
function pitProgressive(taxable){
  let tax=0, prev=0;
  for(const [cap,rate] of PIT_BRACKETS){
    if(taxable<=prev) break;
    tax += (Math.min(taxable,cap)-prev)*rate;
    prev=cap;
  }
  return round2(tax);
}
// ประมาณการอย่างง่าย: เงินได้ 40(2) หักค่าใช้จ่ายเหมา 50% ไม่เกิน 100,000 + ลดหย่อนส่วนตัว (ภ.ง.ด.94 ใช้ครึ่งหนึ่ง)
function pitEstimate(gross, half){
  const expense=round2(Math.min(gross*0.5, 100000));
  const allowance=half?30000:60000;
  const taxable=Math.max(0, round2(gross-expense-allowance));
  return {expense, allowance, taxable, tax:pitProgressive(taxable)};
}
function filingDeadlines(year){
  return [
    {form:'ภ.ง.ด.94', periodTh:'งวดครึ่งปี ม.ค.–มิ.ย. {y}', mFrom:0, mTo:5, due:year+'-09-30', half:true},
    {form:'ภ.ง.ด.90', periodTh:'ทั้งปี ม.ค.–ธ.ค. {y}', mFrom:0, mTo:11, due:(year+1)+'-03-31', half:false}
  ];
}
// แบนเนอร์เตือนกำหนดยื่น — ดูจากวันนี้จริง ๆ ไม่ผูกกับปีที่เลือกในหน้ารายงาน
function filingReminder(){
  if(DB.meta && DB.meta.demo) return '';
  const nowY = parseDate(todayISO()).getFullYear();
  // งวดที่กำหนดยื่นตกในปีนี้: ภ.ง.ด.90 ของปีที่แล้ว (สิ้น มี.ค.) และ ภ.ง.ด.94 ของปีนี้ (สิ้น ก.ย.)
  const candidates = [
    Object.assign({year:nowY-1}, filingDeadlines(nowY-1)[1]),
    Object.assign({year:nowY},   filingDeadlines(nowY)[0])
  ];
  for(const f of candidates){
    const days = Math.round((parseDate(f.due)-parseDate(todayISO()))/DAY);
    if(days<0 || days>60) continue;
    if(!filingIncome(f.year, f.mFrom, f.mTo).count) continue;   // ไม่มีรายรับในงวด — ไม่ต้องเตือน
    const msg = days===0
      ? tr('วันนี้เป็นวันสุดท้ายของการยื่น {f}').replace('{f}',f.form)
      : tr('อีก {d} วันถึงกำหนดยื่น {f}').replace('{d}',days).replace('{f}',f.form);
    return `<div class="banner" style="background:#faf4e3;border-color:#ecdcb4;color:#7a5a1a">
      ${ic('calendar')} <span style="flex:1"><b>${msg}</b> ${tr('(ยื่นออนไลน์ผ่าน RD e-Filing ได้ถึงประมาณ 8 วันหลังกำหนด)')}</span>
      <button class="btn btn-sm btn-primary" onclick="setView('filing')">${ic('barChart')} ${tr('ดูตัวเลขสำหรับยื่น')}</button>
    </div>`;
  }
  return '';
}

    const owe = Math.max(0, round2(est.tax - inc.wht));

const BRAND_PRESETS = [
  {name:'ส้มบิลง่าย (ค่าเริ่มต้น)',hex:'#ff6b00'},
  {name:'เขียวมรกต',hex:'#1f5d43'},
  {name:'เขียวสด',hex:'#0c8a5f'},
  {name:'น้ำเงินโคบอลต์',hex:'#2456c8'},
  {name:'น้ำเงินเข้ม',hex:'#1f4e79'},
  {name:'ฟ้าเทอควอยซ์',hex:'#0e7490'},
  {name:'คราม',hex:'#3b3a86'},
  {name:'ม่วงไวโอเล็ต',hex:'#6d4fc2'},
  {name:'ม่วงพลัม',hex:'#6a2e6b'},
  {name:'ชมพูโรส',hex:'#be3455'},
  {name:'แดงเบอร์กันดี',hex:'#8c2f2a'},
  {name:'ส้มแทนเจอรีน',hex:'#c2410c'},
  {name:'บรอนซ์ทอง',hex:'#7a5a1a'},
  {name:'เทาถ่าน',hex:'#3a3f44'},
  {name:'ดำหมึก',hex:'#26221a'}
];
function validHex(s){ return /^#[0-9a-fA-F]{6}$/.test(String(s||'').trim()); }
// Live-preview a brand color without committing it; keeps the two inputs + swatches in sync.
function previewBrand(val){
  val = String(val||'').trim();
  if(val && val[0]!=='#') val = '#'+val;
  const hexEl=document.getElementById('s_brandHex'), colEl=document.getElementById('s_brand');
  if(hexEl && document.activeElement!==hexEl) hexEl.value = val;
  if(validHex(val)){
    if(colEl) colEl.value = val;
    applyTheme(val);
    document.querySelectorAll('#brandPresets button').forEach(btn=>{
      const on = btn.style.background.replace(/\s/g,'')!=='' && rgbToHex(btn.style.background)===val.toLowerCase();
      btn.style.borderColor = on ? 'var(--text)' : 'var(--border)';
    });
  }
}
function setBrandPreset(hex){
  const colEl=document.getElementById('s_brand'), hexEl=document.getElementById('s_brandHex');
  if(colEl) colEl.value=hex; if(hexEl) hexEl.value=hex;
  previewBrand(hex);
}
// browsers normalize style.background to rgb(...) — convert for swatch matching.
function rgbToHex(s){
  const m=String(s).match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/i);
  if(!m) return String(s).toLowerCase();
  return '#'+[1,2,3].map(i=>Number(m[i]).toString(16).padStart(2,'0')).join('');
}
function pickAsset(key){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=()=>{ const f=inp.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=()=>{ DB.business[key]=r.result; persist(true); render(); }; r.readAsDataURL(f);
  }; inp.click();
}
function removeAsset(key){ DB.business[key]=''; persist(true); render(); }
// Live preview of the PromptPay QR while typing the ID in settings.
function previewPromptpay(val){
  const el=document.getElementById('ppHint'); if(!el) return;
  const payload = promptpayPayload(val, null);
  el.innerHTML = payload
    ? `<div style="width:84px;height:84px">${qrSvg(payload,84)}</div><span style="color:var(--accent-ink)">${ic('check')} ${tr('ใช้ได้ — QR นี้จะแสดงบนใบแจ้งหนี้ (สกุลเงินบาท)')}</span>`
    : (val.replace(/\D/g,'') ? `<span style="color:var(--amber)">${ic('alert')} ${tr('ต้องเป็นเบอร์มือถือ 10 หลัก หรือเลข 13 หลัก')}</span>` : '');
}
function saveSettings(){
  const b=DB.business; const v=id=>document.getElementById(id);
  b.businessName=v('s_name').value; b.businessNameEn=v('s_nameEn').value;
  b.address=v('s_addr').value; b.addressEn=v('s_addrEn').value; b.taxId=v('s_taxid').value;
  b.phone=v('s_phone').value; b.email=v('s_email').value;
  b.bankName=v('s_bankName').value; b.bankAccount=v('s_bankAcc').value; b.bankAccountName=v('s_bankAccName').value;
  b.bankNameEn=v('s_bankNameEn').value; b.swiftCode=v('s_swift').value.trim().toUpperCase();
  b.bankAccountNameEn=v('s_bankAccNameEn').value; b.bankAddress=v('s_bankAddr').value;
  b.promptpayId=v('s_promptpay').value.trim();
  const brand=(v('s_brand')&&v('s_brand').value)||b.brandColor||'#ff6b00';
  b.brandColor = validHex(brand) ? brand.toLowerCase() : '#ff6b00';
  b.isVatRegistered=v('s_vat').checked;
  b.defaultVatRate=Number(v('s_vatRate').value)||0; b.defaultWhtRate=Number(v('s_whtRate').value)||0;
  b.currency=v('s_cur').value; b.defaultTerms=v('s_terms').value; b.defaultTermsEn=v('s_termsEn').value;
  b.yearMode=v('s_year').value; b.lang=v('s_lang').value;
  const langChanged = b.uiLang !== v('s_uiLang').value;
  b.uiLang=v('s_uiLang').value;
  b.numberFormats.quotation=v('s_fmt_q').value; b.numberFormats.invoice=v('s_fmt_i').value;
  b.numberFormats.receipt=v('s_fmt_r').value; b.numberFormats.tax_invoice=v('s_fmt_t').value;
  persist(); applyTheme();
  if(langChanged) render();   // re-draw the whole UI in the new language
  toast(tr('บันทึกการตั้งค่าแล้ว'),'ok');
}

function saveClient(id){
  const v=x=>document.getElementById(x).value.trim();
  const name=v('c_name');
  if(!name){ toast(tr('กรุณากรอกชื่อลูกค้า'),'err'); return; }
  const data={name,contactPerson:v('c_contact'),taxId:v('c_taxid'),address:v('c_addr'),
    email:v('c_email'),phone:v('c_phone'),defaultWht:document.getElementById('c_wht').checked,
    docLang:document.getElementById('c_lang').value,notes:v('c_notes')};
  if(id){ Object.assign(clientById(id),data); }
  else{ DB.clients.push({id:uid(),...data}); }
  persist(); closeModal(); render(); toast(tr('บันทึกลูกค้าแล้ว'),'ok');
}
function deleteClient(id){
  const used = DB.documents.some(d=>d.clientId===id);
  if(used){ toast(tr('ลบไม่ได้ — มีเอกสารผูกกับลูกค้านี้อยู่'),'err'); return; }
  if(!confirm(tr('ลบลูกค้ารายนี้?'))) return;
  DB.clients=DB.clients.filter(c=>c.id!==id);
  persist(); closeModal(); render();
}

function delItem(i){ editDoc.items.splice(i,1); if(!editDoc.items.length) addItem(); drawItems(); drawLadder(); }

function drawItemTotal(i){

function drawLadder(){
  const t=compute(editDoc); const el=document.getElementById('ladder');
  const b=DB.business; const M=n=>fmtMoneyC(n,t.currency);
  el.innerHTML = `
    <div class="row"><span class="lbl">${tr('รวมเป็นเงิน')}</span><span class="amt">${M(t.subtotal)}</span></div>

    <div class="row sub grand"><span class="lbl">${tr('ยอดรวมทั้งสิ้น')}</span><span class="amt">${M(t.grandTotal)}</span></div>
    ${t.whtRate>0?`<div class="row minus"><span class="lbl">${tr('หัก ณ ที่จ่าย')} ${t.whtRate}%</span><span class="amt">−${money(t.whtAmount)}</span></div>`:''}
    <div class="row net"><span class="lbl">${tr('ยอดชำระสุทธิ')}</span><span class="amt">${M(t.netPayable)}</span></div>

function saveDoc(){
  const d=editDoc;
  d.items = d.items.filter(it=> (it.description||'').trim() || Number(it.price)>0 );
  if(!d.items.length){ toast(tr('เพิ่มอย่างน้อยหนึ่งรายการ'),'err'); return; }
  // tax invoice guardrail
  if(d.type==='tax_invoice'){
    const cl=clientById(d.clientId);
    if(!cl.taxId){ toast(tr('ออกใบกำกับภาษีไม่ได้ — ลูกค้ายังไม่มีเลขประจำตัวผู้เสียภาษี'),'err');
      if(confirm(tr('ลูกค้ายังไม่มีเลขภาษี ต้องการเพิ่มตอนนี้?'))){ closeModal(); openClientEditor(cl.id); } return; }
  }
  if(d.id){
    const idx=DB.documents.findIndex(x=>x.id===d.id);
    DB.documents[idx]=d;
  }else{
    d.id=uid(); d.createdAt=new Date().toISOString();
    d.number = nextNumber(d.type, d.issueDate);
    commitNumber(d.type, d.issueDate);
    if(d.type==='receipt'||d.type==='tax_invoice'){ d.status='issued'; if(!d.paidDate) d.paidDate=todayISO(); }
    DB.documents.push(d);
  }
  persist(); closeModal(); viewDoc(d.id);
  toast(tr('บันทึกเอกสารแล้ว'),'ok');
}
function deleteDoc(id){
  if(!confirm(tr('ลบเอกสารนี้?'))) return;
  DB.documents=DB.documents.filter(d=>d.id!==id);
  persist(); closeModal(); setView('documents');
}

let viewingId=null;
function viewDoc(id){ viewingId=id; currentView='docview';
  document.querySelectorAll('#nav button').forEach(b=>b.classList.remove('active'));
  render();
}
function renderDocView(c,ta){
  const d=DB.documents.find(x=>x.id===viewingId);
  if(!d){ setView('documents'); return; }
  const cl=clientById(d.clientId); const t=compute(d); const st=effectiveStatus(d);
  document.getElementById('pageTitle').textContent = d.number;

  // contextual actions
  let actions = `<button class="btn btn-ghost" onclick="setView('documents')">${ic('arrowLeft')} ${tr('กลับ')}</button>`;
  ta.innerHTML = actions;

  let lifecycle='';
  if(d.type==='quotation'){
    if(d.status==='draft') lifecycle+=`<button class="btn" onclick="setStatus('${d.id}','sent')">${tr('ทำเครื่องหมายว่าส่งแล้ว')}</button>`;
    if(d.status==='sent'){ lifecycle+=`<button class="btn" onclick="setStatus('${d.id}','accepted')">${tr('ลูกค้าตอบรับ')}</button>
      <button class="btn btn-danger" onclick="setStatus('${d.id}','declined')">${tr('ลูกค้าปฏิเสธ')}</button>`; }
    // ซ่อนปุ่มแปลง/แบ่งงวดเมื่อออกใบแจ้งหนี้ลูกไปแล้ว (กันออกซ้ำ) — ลบใบลูกทั้งหมดแล้วปุ่มกลับมาเอง
    if((d.status==='accepted'||d.status==='sent') && !invoiceChildren(d).length){
      lifecycle+=`<button class="btn btn-primary" onclick="convertToInvoice('${d.id}')">${ic('arrowRight')} ${tr('แปลงเป็นใบแจ้งหนี้')}</button>
      <button class="btn" onclick="openSplitDialog('${d.id}')">${ic('hash')} ${tr('แบ่งงวด')}</button>`;
    }
  }
  if(d.type==='invoice'){
    if(d.status==='draft') lifecycle+=`<button class="btn" onclick="setStatus('${d.id}','sent')">${tr('ทำเครื่องหมายว่าส่งแล้ว')}</button>`;
    if(d.status==='sent'||st==='overdue') lifecycle+=`<button class="btn btn-primary" onclick="setStatus('${d.id}','paid')">${ic('check')} ${tr('บันทึกรับชำระ')}</button>`;
    if(d.status==='paid') lifecycle+=`<button class="btn btn-primary" onclick="createReceipt('${d.id}')">${ic('arrowRight')} ${tr('ออกใบเสร็จ/ใบกำกับภาษี')}</button>`;
  }

  c.innerHTML = `
    <div class="doc-actions">
      <span style="display:flex;align-items:center;margin-right:6px">${statusBadge(st)}</span>
      ${lifecycle}
      <span style="flex:1"></span>
      <button class="btn" onclick="copyShareText()">${ic('copy')} ${tr('คัดลอกข้อความ')}</button>
      <button class="btn" onclick="window.print()">${ic('printer')} ${tr('พิมพ์')}${IS_ELECTRON?'':' / PDF'}</button>
      ${IS_ELECTRON&&window.billingAPI.exportPDF?`<button class="btn" onclick="savePDF()">${ic('download')} ${tr('บันทึก PDF')}</button>`:''}
      <button class="btn" onclick="openDocEditor('${d.type}','${d.id}')">${ic('pencil')} ${tr('แก้ไข')}</button>
      <button class="btn" onclick="duplicateDoc('${d.id}')">${ic('copy')} ${tr('ทำสำเนา')}</button>
      <button class="btn btn-danger" onclick="deleteDoc('${d.id}')">${ic('trash')} ${tr('ลบ')}</button>
    </div>
    ${docTrail(d)}
    ${d.type==='quotation' ? renderSplitProgress(d) : ''}
    ${renderPaper(d,cl,t)}
  `;
}
// Save the open document as a PDF file (desktop app only).
async function savePDF(){

  const name = String(d.number||'document').replace(/[\/\\:*?"<>|]/g,'-')+'.pdf';

// Ready-to-paste summary for LINE/chat: what, how much, when, where to pay.
function shareText(d){
  const cl=clientById(d.clientId)||{}; const t=compute(d); const b=DB.business;
  // The message goes to the client, so it follows THEIR language, not the app UI language.
  const sl = (cl.docLang || b.lang)==='en' ? 'en' : 'th';
  const T = s => trFor(sl, s);
  const SD = ds => fmtDate(ds, true, sl, sl==='en');
  const cs=curSymOf(t.currency);
  const lines=[TYPE_LABEL[d.type][sl]+' '+d.number+(d.project?' — '+d.project:'')];
  if(cl.name) lines.push(T('เรียน {n}').replace('{n}',cl.name));
  lines.push('');
  if(d.type==='quotation'){
    lines.push(T('ยอดรวม: {a}').replace('{a}',cs+money(t.grandTotal)));
    if(t.whtRate>0) lines.push(T('(ยังไม่หักภาษี ณ ที่จ่าย {r}%)').replace('{r}',t.whtRate));
    lines.push(T('ยืนราคาถึง: {d}').replace('{d}',SD(addDays(d.issueDate,30))));
  }else if(d.type==='invoice'){
    lines.push(T('ยอดชำระสุทธิ: {a}').replace('{a}',cs+money(t.netPayable)));
    if(t.whtRate>0) lines.push(T('(ยอดรวม {a} หักภาษี ณ ที่จ่าย {r}% แล้ว)').replace('{a}',cs+money(t.grandTotal)).replace('{r}',t.whtRate));
    if(d.dueDate) lines.push(T('ครบกำหนดชำระ: {d}').replace('{d}',SD(d.dueDate)));
    if(t.currency==='THB' && b.promptpayId) lines.push(T('ชำระผ่าน PromptPay: {p}').replace('{p}',b.promptpayId));
    const bank=[b.bankName,b.bankAccountName,b.bankAccount].filter(Boolean).join(' · ');
    if(bank) lines.push(T('หรือโอนเข้าบัญชี: {b}').replace('{b}',bank));
  }else{
    lines.push(T('รับชำระแล้ว: {a}').replace('{a}',cs+money(t.netPayable)));
    if(d.paidDate) lines.push(T('วันที่รับชำระ: {d}').replace('{d}',SD(d.paidDate)));
    lines.push('');
    lines.push(T('ขอบคุณที่ใช้บริการ'));
  }
  return lines.join('\n');
}
async function copyShareText(){
  const d=DB.documents.find(x=>x.id===viewingId); if(!d) return;
  const text=shareText(d);
  try{ await navigator.clipboard.writeText(text); }
  catch(e){
    // clipboard API can be blocked on file:// — fall back to execCommand
    const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove();
  }
  toast(tr('คัดลอกข้อความแล้ว — วางส่งใน LINE ได้เลย'),'ok');
}
// Show the lineage: which document this was created from, and what it led to.
function docTrail(d){
  const parent = d.parentId ? DB.documents.find(x=>x.id===d.parentId) : null;
  const children = DB.documents.filter(x=>x.parentId===d.id);
  if(!parent && !children.length) return '';
  const chip = doc => `<a class="trail-chip" onclick="viewDoc('${doc.id}')">${typeName(doc.type)}${doc.milestone?' · '+tr('งวดที่ {i}').replace('{i}',doc.milestone.seq):''} <b>${escapeHtml(doc.number)}</b></a>`;
  let parts=[];
  if(parent) parts.push(`<span class="trail-l">${tr('สร้างจาก')}</span>${chip(parent)}`);
  if(children.length) parts.push(`<span class="trail-l">${ic('arrowRight')} ${tr('นำไปออก')}</span>${children.map(chip).join('')}`);
  return `<div class="doc-trail">${parts.join('<span class="trail-sep"></span>')}</div>`;
}

      ?`Note: The price above does not include ${t.whtRate}% withholding tax (${money(t.whtAmount)}), which the payer is required to deduct at the time of payment.`
      :`หมายเหตุ: ราคาข้างต้นยังไม่หักภาษี ณ ที่จ่าย ${t.whtRate}% (${money(t.whtAmount)}) ซึ่งผู้ว่าจ้างมีหน้าที่หักไว้ ณ วันชำระเงิน`}</div>`:''}

    <div class="footer-grid">
      ${qrBlock?`<div class="col" style="flex:0 0 auto">${qrBlock}</div>`:''}
      ${(d.type==='invoice') && (b.bankName||b.bankAccount||intlPay)?`
      <div class="col"><div class="h">${L('ชำระเงินมาที่','Payment to')}</div>
        <div class="bank">${intlPay
          ? [escapeHtml(b.bankNameEn||b.bankName),
             (b.bankAccountNameEn||b.bankAccountName)?'Account name: '+escapeHtml(b.bankAccountNameEn||b.bankAccountName):'',
             b.bankAccount?'Account no. '+escapeHtml(b.bankAccount):'',
             b.swiftCode?'SWIFT/BIC: '+escapeHtml(b.swiftCode):'',
             b.bankAddress?escapeHtml(b.bankAddress):''].filter(Boolean).join('<br>')
          : `${b.bankName?escapeHtml(b.bankName)+'<br>':''}${b.bankAccountName?escapeHtml(b.bankAccountName)+'<br>':''}${b.bankAccount?L('เลขที่บัญชี','Account no.')+' '+escapeHtml(b.bankAccount):''}`}</div></div>`:''}
      ${d.type==='invoice'?`<div class="col"><div class="h">${L('เงื่อนไข','Terms')}</div><div class="bank">${escapeHtml((en?(b.defaultTermsEn||b.defaultTerms):b.defaultTerms)||'')}</div></div>`:''}
      ${d.notes?`<div class="col"><div class="h">${L('หมายเหตุ','Notes')}</div><div class="bank">${escapeHtml(d.notes).replace(/\n/g,'<br>')}</div></div>`:''}
    </div>

    ${d.type==='quotation'?`<div class="sign">
      <div class="sign-col"><div class="ink">${signMark(b)}</div><div class="line">${L('ผู้เสนอราคา','Quoted by')}</div></div>
      <div class="sign-col"><div class="ink"></div><div class="line">${L('ผู้อนุมัติ / ลงนามตอบรับ','Accepted by')}</div></div>
    </div>`:''}
    ${(d.type==='invoice')?`<div class="sign">
      <div class="sign-col"><div class="ink">${signMark(b)}</div><div class="line">${escapeHtml(((en?(b.businessNameEn||b.businessName):(b.businessName||b.businessNameEn))||'').trim())||L('ผู้มีอำนาจลงนาม','Authorized by')}</div></div>
    </div>`:''}
    ${(d.type==='receipt'||isTax)?`<div class="sign">
      <div class="sign-col"><div class="ink">${signMark(b)}</div><div class="line">${L('ผู้รับเงิน','Received by')}</div></div>
    </div>`:''}
  </div>`;
}
// Issuer signature + company stamp, overlaid above a signature line.
function signMark(b){
  if(!b.signature && !b.stamp) return '';
  return `${b.stamp?`<img class="stamp" src="${b.stamp}">`:''}${b.signature?`<img class="sig" src="${b.signature}">`:''}`;
}

/* ---------- lifecycle actions ---------- */
function setStatus(id,st){
  const d=DB.documents.find(x=>x.id===id);
  d.status=st;
  if(st==='paid' && !d.paidDate) d.paidDate=todayISO();
  persist(); render();
  if(st==='paid'){
    stampFx(tr('ชำระแล้ว'), fmtMoneyC(compute(d).netPayable, docCurrency(d))+' · '+fmtDate(d.paidDate));
  }else{
    toast(tr('อัปเดตสถานะ:')+' '+(tr(STATUS_LABEL[st])||st),'ok');
  }
}
function convertToInvoice(id){
  const q=DB.documents.find(x=>x.id===id);
  q.status='accepted';
  const inv={
    id:uid(), type:'invoice', number:nextNumber('invoice',todayISO()),
    clientId:q.clientId, parentId:q.id, issueDate:todayISO(), dueDate:addDays(todayISO(),30),
    paidDate:null, status:'draft', project:q.project, currency:docCurrency(q),
    items:JSON.parse(JSON.stringify(q.items)), vatRate:q.vatRate, whtRate:q.whtRate,
    docLang:q.docLang||'', fxRate:q.fxRate||null,
    notes:q.notes, createdAt:new Date().toISOString()
  };
  commitNumber('invoice',todayISO());
  DB.documents.push(inv);
  persist(); viewDoc(inv.id);
  toast(tr('สร้างใบแจ้งหนี้จากใบเสนอราคาแล้ว'),'ok');
}
function createReceipt(id){
  const inv=DB.documents.find(x=>x.id===id);
  const cl=clientById(inv.clientId);
  const asTax = DB.business.isVatRegistered;
  if(asTax && !cl.taxId){
    if(confirm(tr('ลูกค้ายังไม่มีเลขภาษี — ออกได้เฉพาะใบเสร็จธรรมดา (ไม่ใช่ใบกำกับภาษี)\nต้องการเพิ่มเลขภาษีก่อน?'))){
      openClientEditor(cl.id); return;
    }
  }
  const type = (asTax && cl.taxId)? 'tax_invoice':'receipt';
  const rec={
    id:uid(), type, number:nextNumber(type,todayISO()),
    clientId:inv.clientId, parentId:inv.id, issueDate:todayISO(),
    dueDate:null, paidDate:inv.paidDate||todayISO(), status:'issued', project:inv.project, currency:docCurrency(inv),
    items:JSON.parse(JSON.stringify(inv.items)), vatRate:inv.vatRate, whtRate:inv.whtRate,
    docLang:inv.docLang||'', fxRate:inv.fxRate||null,
    notes:inv.notes, createdAt:new Date().toISOString()
  };
  commitNumber(type,todayISO());
  DB.documents.push(rec);
  persist(); viewDoc(rec.id);
  toast(tr(type==='tax_invoice'?'ออกใบเสร็จ/ใบกำกับภาษีแล้ว':'ออกใบเสร็จแล้ว'),'ok');
}
function duplicateDoc(id){
  const src=DB.documents.find(x=>x.id===id);
  const copy=JSON.parse(JSON.stringify(src));
  copy.id=uid(); copy.parentId=null; copy.issueDate=todayISO();
  delete copy.milestone;   // สำเนาไม่ใช่งวดของใคร
  copy.createdAt=new Date().toISOString();
  copy.status = (copy.type==='receipt'||copy.type==='tax_invoice')?'issued':'draft';
  if(copy.type==='invoice') copy.dueDate=addDays(todayISO(),30);
  if(copy.type==='receipt'||copy.type==='tax_invoice') copy.paidDate=todayISO();
  copy.number=nextNumber(copy.type,copy.issueDate);
  commitNumber(copy.type,copy.issueDate);
  DB.documents.push(copy);
  persist(); viewDoc(copy.id);
  toast(tr('ทำสำเนาแล้ว'),'ok');
}

/* ============================================================
   แบ่งงวด — split a quotation into milestone invoices
   ============================================================ */
function invoiceChildren(q){ return DB.documents.filter(x=> x.parentId===q.id && x.type==='invoice'); }
// billed = ยอดที่ออกใบแจ้งหนี้แล้ว, paid = ชำระแล้ว (หรือมีใบเสร็จลูกแล้ว) — เทียบกับยอดใบเสนอราคา
function splitProgress(q){
  const kids = invoiceChildren(q);
  const total = compute(q).grandTotal;
  let billed=0, paid=0;
  kids.forEach(k=>{
    const g=compute(k).grandTotal; billed+=g;
    const hasReceipt = DB.documents.some(r=> r.parentId===k.id && (r.type==='receipt'||r.type==='tax_invoice'));
    if(k.status==='paid' || hasReceipt) paid+=g;
  });
  billed=round2(billed); paid=round2(paid);
  const remaining = Math.max(0, round2(total-billed));   // เศษสตางค์จาก VAT รายใบ — ต่ำกว่า 0.05 ถือว่าครบ
  return {kids, total, billed, paid, remaining, fullyBilled: kids.length>0 && (total-billed)<0.05};
}
function renderSplitProgress(q){
  const p = splitProgress(q);
  if(!p.kids.length) return '';
  const cs = curSymOf(docCurrency(q));
  const pctPaid = p.total? Math.min(100, p.paid/p.total*100) : 0;
  const pctBilledOnly = p.total? Math.max(0, Math.min(100, p.billed/p.total*100) - pctPaid) : 0;
  return `<div class="split-progress">
    <div class="sp-head"><b>${tr('การแบ่งงวด')}</b>
      <span class="muted">${tr('{n} งวด').replace('{n}',p.kids.length)}${p.fullyBilled?' · '+tr('ออกใบแจ้งหนี้ครบแล้ว'):''}</span></div>
    <div class="sp-track">
      <div class="sp-paid" style="width:${pctPaid.toFixed(1)}%"></div>
      <div class="sp-billed" style="width:${pctBilledOnly.toFixed(1)}%"></div>
    </div>
    <div class="sp-stats">
      <span>${tr('ชำระแล้ว')} <b>${cs}${money(p.paid)}</b></span>
      <span>${tr('ออกบิลแล้ว')} <b>${cs}${money(p.billed)}</b></span>
      ${p.remaining>=0.05?`<span>${tr('ยังไม่ออกบิล')} <b>${cs}${money(p.remaining)}</b></span>`:''}
    </div>
  </div>`;
}

let splitState=null;   // {qid, rows:[{label, amount, due}]} — แถวสุดท้ายไม่มี amount (ยอดคงเหลืออัตโนมัติ)
function splitBase(q){ return compute(q).subtotal; }   // แบ่งจากยอดก่อน VAT — แต่ละใบคำนวณ VAT/WHT ของตัวเอง
function openSplitDialog(qid){
  const q=DB.documents.find(x=>x.id===qid); if(!q) return;
  if(invoiceChildren(q).length){ toast(tr('ใบเสนอราคานี้แบ่งงวดแล้ว — ลบใบแจ้งหนี้งวดเดิมก่อนถ้าต้องการแบ่งใหม่'),'err'); return; }
  const base=splitBase(q);
  if(!(base>0)){ toast(tr('ยอดใบเสนอราคาเป็นศูนย์ — แบ่งงวดไม่ได้'),'err'); return; }
  // ป้ายชื่องวดพิมพ์ลงเอกสาร — ตั้งต้นตามภาษาเอกสาร ไม่ใช่ภาษา UI
  const enDoc = docLangOf(q)==='en';
  splitState={ qid, rows:[
    {label:enDoc?'Deposit':'มัดจำ', amount:round2(base*0.5), due:addDays(todayISO(),30)},
    {label:enDoc?'Delivery':'ส่งมอบงาน', amount:null, due:addDays(todayISO(),60)}
  ]};
  drawSplitDialog();
}
function splitPreset(pcts){
  const q=DB.documents.find(x=>x.id===splitState.qid); const base=splitBase(q);
  splitState.rows = pcts.map((p,i)=>({
    label: splitState.rows[i] ? splitState.rows[i].label : '',   // คำว่า "งวดที่ i/N" ใส่ให้อัตโนมัติอยู่แล้ว
    amount: i===pcts.length-1 ? null : round2(base*p/100),
    due: addDays(todayISO(), 30*(i+1))
  }));
  drawSplitDialog();
}
function splitAdd(){
  if(splitState.rows.length>=12) return;
  splitState.rows.splice(splitState.rows.length-1, 0, {label:'', amount:0, due:addDays(todayISO(),30*splitState.rows.length)});
  drawSplitDialog();
}
function splitDel(i){
  if(splitState.rows.length<=2) return;
  splitState.rows.splice(i,1);
  drawSplitDialog();
}
function splitUpd(i,k,v){
  const row=splitState.rows[i];
  if(k==='amount') row.amount=round2(Number(v)||0);
  else if(k==='pct'){ const q=DB.documents.find(x=>x.id===splitState.qid); row.amount=round2(splitBase(q)*(Number(v)||0)/100); }
  else row[k]=v;
  if(k==='amount'||k==='pct') drawSplitDialog();
}
function splitBalance(){
  const q=DB.documents.find(x=>x.id===splitState.qid);
  const others=splitState.rows.slice(0,-1).reduce((s,r)=>s+(Number(r.amount)||0),0);
  return round2(splitBase(q)-others);
}
function drawSplitDialog(){
  const q=DB.documents.find(x=>x.id===splitState.qid);
  const base=splitBase(q); const cs=curSymOf(docCurrency(q));
  const bal=splitBalance(); const n=splitState.rows.length;
  const pctOf=a=> base? (a/base*100) : 0;
  const rowsHtml=splitState.rows.map((r,i)=>{
    const last=i===n-1;
    const amt=last? bal : (Number(r.amount)||0);
    return `<tr>
      <td class="muted">${i+1}</td>
      <td><input type="text" value="${attr(r.label)}" placeholder="${attr(tr('เช่น มัดจำ / ส่งมอบงาน / ตรวจรับ'))}" onchange="splitUpd(${i},'label',this.value)"></td>
      <td class="num-col">${last
        ? `<span class="bal">${pctOf(amt).toFixed(1)}%</span>`
        : `<input type="number" min="0" max="100" step="0.1" value="${pctOf(amt).toFixed(1)}" onchange="splitUpd(${i},'pct',this.value)">`}</td>
      <td class="amt-col">${last
        ? `<span class="bal">${cs}${money(amt)}</span>`
        : `<input type="number" min="0" step="0.01" value="${amt}" onchange="splitUpd(${i},'amount',this.value)">`}</td>
      <td class="date-col"><input type="date" value="${r.due||''}" onchange="splitUpd(${i},'due',this.value)"></td>
      <td>${n>2?`<button class="btn btn-sm" onclick="splitDel(${i})">${ic('trash',13)}</button>`:''}</td>
    </tr>`;
  }).join('');
  const m=document.getElementById('modal');
  m.innerHTML=`
    <div class="modal-head"><h3>${tr('แบ่งงวด')} — ${escapeHtml(q.number)}</h3><div class="spacer"></div><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="muted" style="font-size:12px;margin-bottom:10px">${tr('ยอดก่อน VAT {a} — งวดสุดท้ายปรับยอดให้ครบอัตโนมัติ แต่ละงวดจะคิด VAT/หัก ณ ที่จ่าย ของตัวเอง').replace('{a}',cs+money(base))}</div>
      <div class="pill-select" style="margin-bottom:12px">
        <button onclick="splitPreset([50,50])">50/50</button>
        <button onclick="splitPreset([30,40,30])">30/40/30</button>
        <button onclick="splitPreset([100/3,100/3,100/3])">${tr('3 งวดเท่ากัน')}</button>
        <button onclick="splitPreset([25,25,25,25])">${tr('4 งวดเท่ากัน')}</button>
      </div>
      <table class="split-rows">
        <tr><th>#</th><th>${tr('ชื่องวด (ตาม TOR)')}</th><th>%</th><th>${tr('จำนวนเงิน')}</th><th>${tr('ครบกำหนด')}</th><th></th></tr>
        ${rowsHtml}
      </table>
      <button class="btn btn-sm" style="margin-top:10px" onclick="splitAdd()">${ic('plus',13)} ${tr('เพิ่มงวด')}</button>
      ${bal<0.005?`<div class="banner" style="background:var(--red-bg);border-color:#e6c5bd;color:#9c3022;margin-top:10px">${ic('alert')} ${tr('ยอดงวดก่อนหน้ารวมเกินยอดใบเสนอราคา — ลดยอดบางงวดลง')}</div>`:''}
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">${tr('ยกเลิก')}</button>
      <button class="btn btn-primary" onclick="saveSplit()">${ic('arrowRight')} ${tr('สร้างใบแจ้งหนี้ {n} งวด').replace('{n}',n)}</button>
    </div>`;
  openModal();
}
function saveSplit(){
  const q=DB.documents.find(x=>x.id===splitState.qid);
  const bal=splitBalance();
  const amounts=[...splitState.rows.slice(0,-1).map(r=>round2(Number(r.amount)||0)), bal];
  if(amounts.some(a=> !(a>0))){ toast(tr('ทุกงวดต้องมียอดมากกว่าศูนย์'),'err'); return; }
  splitQuotation(q, splitState.rows.map((r,i)=>({label:(r.label||'').trim(), amount:amounts[i], due:r.due||null})));
}
function splitQuotation(q, rows){
  const N=rows.length;
  const lang=docLangOf(q);                         // คำบรรยายงวดพิมพ์ลงกระดาษ — ตามภาษาเอกสาร ไม่ใช่ภาษา UI
  rows.forEach((r,idx)=>{
    const i=idx+1;
    const th=`งวดที่ ${i}/${N}${r.label?' — '+r.label:''} · อ้างอิง ${q.number}`;
    const en=`Installment ${i}/${N}${r.label?' — '+r.label:''} · ref ${q.number}`;
    const bi=`งวดที่ ${i}/${N} (Installment ${i}/${N})${r.label?' — '+r.label:''} · อ้างอิง/ref ${q.number}`;
    const description = lang==='en' ? en : lang==='bilingual' ? bi : th;
    const inv={
      id:uid(), type:'invoice', number:nextNumber('invoice',todayISO()),
      clientId:q.clientId, parentId:q.id, issueDate:todayISO(), dueDate:r.due||addDays(todayISO(),30*i),
      paidDate:null, status:'draft', project:q.project, currency:docCurrency(q),
      items:[{description, qty:1, unit: lang==='en'?'installment':'งวด', price:r.amount}],
      vatRate:q.vatRate, whtRate:q.whtRate,
      docLang:q.docLang||'', fxRate:q.fxRate||null,
      notes:q.notes, milestone:{seq:i, of:N, label:r.label},
      createdAt:new Date().toISOString()
    };
    commitNumber('invoice',todayISO());             // ย้ำ: ต้อง commit ทุกวน ไม่งั้นเลขซ้ำทั้งชุด
    DB.documents.push(inv);
  });
  q.status='accepted';
  splitState=null;
  persist(); closeModal(); viewDoc(q.id);
  toast(tr('สร้างใบแจ้งหนี้ {n} งวดแล้ว').replace('{n}',N),'ok');
}

/* ============================================================
   MODAL utils
   ============================================================ */
function openModal(){ document.getElementById('overlay').classList.add('open'); }
function closeModal(){ document.getElementById('overlay').classList.remove('open'); document.getElementById('modal').innerHTML=''; }
document.getElementById('overlay').addEventListener('mousedown',e=>{ if(e.target.id==='overlay') closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

/* ---------- escaping ---------- */
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function attr(s){ return escapeHtml(s).replace(/"/g,'&quot;'); }

/* ============================================================
   BOOT
   ============================================================ */
async function boot(){
  // Desktop app: load from the native store and we're done.
  if(IS_ELECTRON){
    let raw = null;
    try{ raw = await window.billingAPI.load(); }catch(e){ loadFailed = true; }
    if(raw){
      // A data file EXISTS — if it won't parse, never autosave a blank DB over it.
      try{ DB = migrate(JSON.parse(raw)); }
      catch(e){ loadFailed = true; }
    }
    if(!DB) DB = blankDB();
    try{ dataLoc = await window.billingAPI.where(); }catch(e){}
    if(window.billingAPI.onMenuExport) window.billingAPI.onMenuExport(()=>elExport());
    if(window.billingAPI.onMenuImport) window.billingAPI.onMenuImport(()=>elImport());
    applyTheme();
    updateFileStatus();
    setView('dashboard');
    if(!loadFailed && !DB.meta.setupDone && !DB.business.businessName && !DB.documents.length) openWizard();
    return;
  }

  // 1) Show cached data immediately so the UI is never empty.
  DB = migrate(loadLocal() || blankDB());
  applyTheme();
  updateFileStatus();
  setView('dashboard');

  // 2) Try to reconnect the billing.json from a previous session (source of truth).
  if(supportsFSA){
    try{
      const h = await idbGet(HANDLE_KEY);
      if(h){
        const perm = await h.queryPermission({mode:'readwrite'});
        if(perm==='granted'){
          fileHandle = h;
          await loadFromHandle();   // file overrides the cache
          render();
        }else{
          // Browser needs a click to re-grant file access (common on file:// pages).
          pendingHandle = h;
        }
        updateFileStatus();
      }
    }catch(e){/* no saved handle */}
  }

  // First run in the browser too — but only when no saved file might still load.
  if(!fileHandle && !pendingHandle && !DB.meta.setupDone && !DB.business.businessName && !DB.documents.length) openWizard();

  window.addEventListener('beforeunload',e=>{ if(dirty && fileHandle){ e.preventDefault(); e.returnValue=''; } });
}
// paint the static sidebar nav icons
document.querySelectorAll('.nav .ico[data-ic]').forEach(s=> s.innerHTML = ic(s.dataset.ic,18));
boot();
